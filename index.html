<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Studio | Professional Photographer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav>
        <div class="logo">CAPTURE.</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#gallery">Portfolio</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Melukis dengan Cahaya.</h1>
            <p>Mendedikasikan setiap jepretan untuk cerita yang tak terlupakan.</p>
            <a href="#gallery" class="btn">Lihat Karya</a>
        </div>
    </header>

    <section id="gallery" class="portfolio">
        <div class="section-title">
            <h2>Selected Works</h2>
            <div class="line"></div>
        </div>
        
        <div class="grid-container">
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=600&q=80" alt="Work 1"></div>
            <div class="grid-item tall"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=600&q=80" alt="Work 2"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=600&q=80" alt="Work 3"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1520852221158-9cb7f023755e?auto=format&fit=crop&w=600&q=80" alt="Work 4"></div>
            <div class="grid-item wide"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=1200&q=80" alt="Work 5"></div>
        </div>
    </section>

    <footer id="contact">
        <div class="footer-content">
            <h3>Mari Berkolaborasi</h3>
            <p>Tersedia untuk sesi foto komersial dan personal.</p>
            <div class="social-icons">
                <i data-lucide="instagram"></i>
                <i data-lucide="camera"></i>
                <i data-lucide="mail"></i>
            </div>
            <p class="copyright">&copy; 2026 Capture Studio. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
